spring.application.name=user-notification-post-linkedin

spring.rabbitmq.host = localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

######################
# SMTP SERVER CONFIG #
######################

spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=guest
spring.mail.password=guest
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

##############################
# FreeMarker Template CONFIG #
##############################

freemarker.template-loader-path: classpath:/templates/
freemarker.suffix: .ftl

##############################
# H2 DATABASE
##############################

spring.datasource.url=jdbc:h2:file:C:/dataprojectspring/user-test-db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console